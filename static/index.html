<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinder DM Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="options-btn" class="gear-btn" title="Options" aria-label="Options">⚙</button>

  <div class="layout">
    <aside class="sidebar">
      <h1 class="app-title">Pathfinder DM Tools</h1>
      <a class="sidebar-link" href="battle-helper/">Battle Helper</a>
      <details id="character-section" open>
        <summary>Characters</summary>
        <div id="character-tree"></div>
      </details>
      <div class="sidebar-actions">
        <button id="new-btn">+ New</button>
        <button id="new-group-btn">+ New Group</button>
      </div>
      <details id="history-section" open>
        <summary>Roll History</summary>
        <ul id="roll-history"></ul>
        <button id="clear-history-btn" class="subtle">Clear history</button>
      </details>
    </aside>

    <main class="main">
      <div id="main-content">
        <p class="placeholder">Select a character, or add a new one.</p>
      </div>
    </main>
  </div>

  <dialog id="new-dialog">
    <form id="new-form">
      <h2>Add character</h2>
      <label for="character-link">Pathbuilder 2e character link or ID</label>
      <input
        type="text"
        id="character-link"
        placeholder="https://pathbuilder2e.com/json.php?id=123456 or 123456"
      />
      <p class="dialog-status" id="new-status"></p>
      <div class="dialog-actions">
        <button type="button" id="new-cancel">Cancel</button>
        <button type="submit" id="new-submit">Fetch</button>
      </div>
    </form>
  </dialog>

  <dialog id="collision-dialog">
    <h2>Name already exists</h2>
    <p id="collision-message"></p>
    <label for="collision-target">Character to override</label>
    <select id="collision-target"></select>
    <p class="dialog-status" id="collision-status"></p>
    <div class="dialog-actions">
      <button type="button" id="collision-cancel">Cancel</button>
      <button type="button" id="collision-override">Override selected</button>
      <button type="button" id="collision-copy" class="primary">Copy (keep both)</button>
    </div>
  </dialog>

  <dialog id="group-dialog">
    <form id="group-form">
      <h2>New group</h2>
      <label for="group-name">Group name</label>
      <input type="text" id="group-name" placeholder="e.g. Party A" />
      <p class="dialog-status" id="group-status"></p>
      <div class="dialog-actions">
        <button type="button" id="group-cancel">Cancel</button>
        <button type="submit" id="group-submit">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="delete-dialog">
    <h2>Delete character</h2>
    <p id="delete-message"></p>
    <p class="dialog-status" id="delete-status"></p>
    <div class="dialog-actions">
      <button type="button" id="delete-cancel">Cancel</button>
      <button type="button" id="delete-confirm" class="danger">Delete</button>
    </div>
  </dialog>

  <dialog id="delete-group-dialog">
    <h2>Delete group</h2>
    <p id="delete-group-message"></p>
    <p class="dialog-status" id="delete-group-status"></p>
    <div class="dialog-actions">
      <button type="button" id="delete-group-cancel">Cancel</button>
      <button type="button" id="delete-group-confirm" class="danger">Delete</button>
    </div>
  </dialog>

  <dialog id="options-dialog">
    <h2>Options</h2>
    <div id="options-panel-body"></div>
    <div class="dialog-actions">
      <button type="button" id="options-close">Close</button>
    </div>
  </dialog>

  <dialog id="aon-dialog" class="aon-dialog">
    <div class="aon-dialog-header">
      <span id="aon-dialog-title"></span>
      <div class="aon-dialog-actions">
        <a id="aon-dialog-open-tab" href="#" target="_blank" rel="noopener">Open in new tab</a>
        <button type="button" id="aon-dialog-close">Close</button>
      </div>
    </div>
    <div id="aon-dialog-body"></div>
  </dialog>

  <script src="pf2e-math.js"></script>
  <script src="app.js"></script>
</body>
</html>
